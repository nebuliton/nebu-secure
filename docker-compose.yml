version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      TELESCOPE_ENABLED: "false"
    ports:
      - "8080:8080"
    volumes:
      - app_storage:/var/www/html/storage
      - app_database:/var/www/html/database

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      TELESCOPE_ENABLED: "false"
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--timeout=90", "--no-interaction"]
    volumes:
      - app_storage:/var/www/html/storage
      - app_database:/var/www/html/database

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      TELESCOPE_ENABLED: "false"
    command: ["php", "artisan", "schedule:work", "--no-interaction"]
    volumes:
      - app_storage:/var/www/html/storage
      - app_database:/var/www/html/database

volumes:
  app_storage:
  app_database:
